# uMailServer Configuration Example
# This is the modern configuration format

server:
  hostname: mail.example.com
  data_dir: /var/lib/umailserver

# TLS Configuration
tls:
  cert_file: ""               # Path to TLS certificate (leave empty for ACME)
  key_file: ""                # Path to TLS key (leave empty for ACME)
  min_version: "1.2"          # Minimum TLS version: "1.2" or "1.3"
  acme:
    enabled: true
    email: admin@example.com
    provider: letsencrypt     # letsencrypt or letsencrypt-staging
    challenge: http-01        # http-01 or dns-01

# SMTP Server Configuration
smtp:
  inbound:
    enabled: true
    port: 25
    bind: "0.0.0.0"
    max_message_size: 50MB
    max_recipients: 100
    max_connections: 10000    # Max concurrent connections (0 = unlimited)
    read_timeout: 5m
    write_timeout: 5m
  submission:
    enabled: true
    port: 587
    bind: "0.0.0.0"
    require_auth: true
    require_tls: true
    max_connections: 10000
  submission_tls:
    enabled: true
    port: 465
    bind: "0.0.0.0"
    require_auth: true
    max_connections: 10000

# IMAP Server Configuration
imap:
  enabled: true
  port: 993
  bind: "0.0.0.0"
  starttls_port: 143
  max_connections: 10000      # Max concurrent connections (0 = unlimited)
  idle_timeout: 30m

# POP3 Server Configuration
pop3:
  enabled: false
  port: 995
  bind: "0.0.0.0"
  max_connections: 10000      # Max concurrent connections (0 = unlimited)

# HTTP API Configuration
http:
  enabled: true
  port: 443
  http_port: 80               # Redirects to HTTPS
  bind: "0.0.0.0"
  cors_origins: []            # Allowed CORS origins

# Admin Panel Configuration
admin:
  enabled: true
  port: 8443
  bind: "127.0.0.1"

# Security Configuration
security:
  max_login_attempts: 5
  lockout_duration: 15m
  jwt_secret: "change-me-to-a-32-character-secret-minimum"
  rate_limit:
    smtp_per_minute: 30       # SMTP auth attempts per minute per IP
    smtp_per_hour: 500        # SMTP connections per hour per IP
    imap_connections: 50      # Max concurrent IMAP connections per IP
    http_requests_per_minute: 120  # API requests per minute per IP

# Spam Filter Configuration
spam:
  enabled: true
  reject_threshold: 9.0
  junk_threshold: 3.0
  quarantine_threshold: 6.0
  bayesian:
    enabled: true
    auto_train: true
  greylisting:
    enabled: true
    delay: 5m
  rbl_servers:
    - zen.spamhaus.org
    - b.barracudacentral.org
    - bl.spamcop.net

# Antivirus Configuration
av:
  enabled: false
  addr: "127.0.0.1:3310"      # ClamAV address
  timeout: 30s
  action: reject              # reject, quarantine, or tag

# MCP Server (Model Context Protocol)
mcp:
  enabled: true
  port: 3000
  bind: "127.0.0.1"
  auth_token: ""              # Set to enable authentication

# Logging Configuration
logging:
  level: info                 # debug, info, warn, error
  format: json                # json or text
  output: stdout              # stdout, stderr, or file path
  max_size_mb: 100            # Max log file size before rotation
  max_backups: 10             # Number of old log files to keep
  max_age_days: 30            # Max age of old log files in days

# Metrics Configuration
metrics:
  enabled: true
  port: 8080
  bind: "127.0.0.1"
  path: /metrics

# Database Configuration
database:
  path: /var/lib/umailserver/db

# Storage Configuration
storage:
  sync: true                  # Sync writes to disk
  shared_folders: false       # Enable shared folders

# Domain Configuration
domains:
  - name: example.com
    max_accounts: 100
    max_mailbox_size: 5GB
    dkim:
      selector: default
