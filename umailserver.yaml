# uMailServer Configuration
# Generated by quickstart for admin@example.com

server:
  hostname: mail.example.com
  data_dir: ./data

tls:
  acme:
    enabled: true
    email: admin@example.com
    provider: letsencrypt

smtp:
  inbound:
    port: 25
    max_message_size: 52428800  # 50MB
    max_recipients: 100
  submission:
    port: 587
    require_auth: true
    require_tls: true
  submission_tls:
    port: 465

imap:
  port: 993

http:
  port: 443
  http_port: 80

admin:
  port: 8443
  bind: 127.0.0.1

spam:
  reject_threshold: 9.0
  junk_threshold: 3.0
  greylisting:
    enabled: true
    delay: 5m

dkim:
  enabled: true
  selector: default
  domain: example.com
  key_file: data\dkim\example.com.private.pem

domains:
  - name: example.com
    max_accounts: 100
    max_mailbox_size: 5368709120  # 5GB
