name: CI

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master, develop]

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'
  GOTOOLCHAIN: auto

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build web UIs
        run: |
          (cd webmail && npm ci && npm run build) &&
          (cd web/admin && npm ci && npm run build) &&
          (cd web/account && npm install && npm run build)

      - name: Run golangci-lint
        if: false  # Temporarily disabled - golangci-lint binary built for Go 1.24, need version compiled for Go 1.25
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: fromsource
          verify: false
          args: --timeout=5m

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files need formatting:"
            gofmt -l .
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build web UIs
        run: |
          (cd webmail && npm ci && npm run build) &&
          (cd web/admin && npm ci && npm run build) &&
          (cd web/account && npm install && npm run build)

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build webmail
        run: |
          (cd webmail && npm ci && npm run build)

      - name: Build admin panel
        run: |
          (cd web/admin && npm ci && npm run build)

      - name: Build account portal
        run: |
          (cd web/account && npm install && npm run build)

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=dev -X main.BuildDate=$(date -u +%Y-%m-%d)" -o umailserver ./cmd/umailserver

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: umailserver-dev
          path: umailserver

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: umailserver:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm umailserver:test version

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright
        run: |
          cd e2e
          npm ci
          npx playwright install chromium firefox webkit

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: umailserver-dev
          path: .

      - name: Make binary executable
        run: chmod +x umailserver

      - name: Run E2E tests
        run: |
          cd e2e
          npm test
        env:
          BASE_URL: http://localhost:8080
          WEBSERVER_CMD: "../umailserver --config ../config/test.yaml"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
