definitions:
  api.Mail:
    properties:
      body:
        type: string
      date:
        type: string
      folder:
        type: string
      from:
        type: string
      fromName:
        type: string
      hasAttachments:
        type: boolean
      id:
        type: string
      preview:
        type: string
      read:
        type: boolean
      size:
        type: integer
      starred:
        type: boolean
      subject:
        type: string
      to:
        items:
          type: string
        type: array
    type: object
info:
  contact: {}
paths:
  /api/v1/accounts:
    get:
      consumes:
      - application/json
      description: |-
        Returns a list of all accounts for a domain
        Creates a new email account
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: List of accounts
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "201":
          description: Account created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      - BearerAuth: []
      summary: Create account
      tags:
      - Accounts
      - Accounts
    post:
      consumes:
      - application/json
      description: |-
        Returns a list of all accounts for a domain
        Creates a new email account
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: List of accounts
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "201":
          description: Account created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      - BearerAuth: []
      summary: Create account
      tags:
      - Accounts
      - Accounts
  /api/v1/domains:
    get:
      consumes:
      - application/json
      description: |-
        Returns a list of all domains
        Creates a new domain
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: List of domains
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "201":
          description: Domain created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      - BearerAuth: []
      summary: Create domain
      tags:
      - Domains
      - Domains
    post:
      consumes:
      - application/json
      description: |-
        Returns a list of all domains
        Creates a new domain
      produces:
      - application/json
      - application/json
      responses:
        "200":
          description: List of domains
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "201":
          description: Domain created
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      - BearerAuth: []
      summary: Create domain
      tags:
      - Domains
      - Domains
  /api/v1/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password, returns JWT token
      parameters:
      - description: User email
        in: body
        name: email
        required: true
        schema:
          type: string
      - description: User password
        in: body
        name: password
        required: true
        schema:
          type: string
      - description: TOTP code if MFA is enabled
        in: body
        name: totp_code
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Too many login attempts
          schema:
            additionalProperties: true
            type: object
      summary: User login
      tags:
      - Auth
  /api/v1/mail:
    get:
      description: Returns a list of emails from the specified mailbox folder
      parameters:
      - description: Folder name (default INBOX)
        in: query
        name: folder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of emails
          schema:
            items:
              $ref: '#/definitions/api.Mail'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List emails in folder
      tags:
      - Mail
  /api/v1/mail/delete:
    delete:
      description: Moves an email to the Trash folder
      parameters:
      - description: Message ID
        in: query
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Email deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete email
      tags:
      - Mail
  /api/v1/mail/send:
    post:
      consumes:
      - application/json
      description: Sends an email and stores it in the Sent folder
      parameters:
      - description: Email data
        in: body
        name: email
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Email sent
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Send email
      tags:
      - Mail
  /api/v1/refresh:
    post:
      description: Returns a new JWT token with extended expiry
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Refresh token
      tags:
      - Auth
  /health:
    get:
      description: Returns the current health status of the server including database,
        queue, and storage checks
      produces:
      - application/json
      responses:
        "200":
          description: Server is healthy
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Server is unhealthy
          schema:
            additionalProperties: true
            type: object
      summary: Get server health
      tags:
      - Health
  /health/ready:
    get:
      description: Returns whether the server is ready to accept traffic. Used for
        kubernetes readiness probes.
      produces:
      - application/json
      responses:
        "200":
          description: Server is ready
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Server is not ready
          schema:
            additionalProperties: true
            type: object
      summary: Get server readiness for zero-downtime deployment
      tags:
      - Health
swagger: "2.0"
