# uMailServer GoReleaser Configuration
# Documentation: https://goreleaser.com

version: 2

project_name: umailserver

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: umailserver
    main: ./cmd/umailserver
    binary: umailserver
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - freebsd
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm
      - goos: freebsd
        goarch: arm
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildDate={{.Date}}
      - -X main.GitCommit={{.Commit}}

archives:
  - id: umailserver
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - umailserver.yaml.example
      - scripts/install.sh

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

dockers:
  - id: amd64
    goarch: amd64
    image_templates:
      - "ghcr.io/umailserver/{{ .ProjectName }}:{{ .Tag }}-amd64"
      - "ghcr.io/umailserver/{{ .ProjectName }}:v{{ .Major }}-amd64"
      - "ghcr.io/umailserver/{{ .ProjectName }}:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"

  - id: arm64
    goarch: arm64
    image_templates:
      - "ghcr.io/umailserver/{{ .ProjectName }}:{{ .Tag }}-arm64"
      - "ghcr.io/umailserver/{{ .ProjectName }}:v{{ .Major }}-arm64"
      - "ghcr.io/umailserver/{{ .ProjectName }}:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"

docker_manifests:
  - name_template: "ghcr.io/umailserver/{{ .ProjectName }}:{{ .Tag }}"
    image_templates:
      - "ghcr.io/umailserver/{{ .ProjectName }}:{{ .Tag }}-amd64"
      - "ghcr.io/umailserver/{{ .ProjectName }}:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/umailserver/{{ .ProjectName }}:v{{ .Major }}"
    image_templates:
      - "ghcr.io/umailserver/{{ .ProjectName }}:v{{ .Major }}-amd64"
      - "ghcr.io/umailserver/{{ .ProjectName }}:v{{ .Major }}-arm64"
  - name_template: "ghcr.io/umailserver/{{ .ProjectName }}:latest"
    image_templates:
      - "ghcr.io/umailserver/{{ .ProjectName }}:latest-amd64"
      - "ghcr.io/umailserver/{{ .ProjectName }}:latest-arm64"

release:
  github:
    owner: umailserver
    name: umailserver
  draft: true
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Tag }}"
  header: |
    ## uMailServer {{ .Tag }}

    One binary. Complete email.

    ### Installation

    ```bash
    # Linux/macOS
    curl -fsSL https://get.umailserver.com | sudo bash

    # Or download from releases
    ```

  footer: |
    ## Docker Images

    ```bash
    docker pull ghcr.io/umailserver/umailserver:{{ .Tag }}
    ```

    ## Verification

    Binaries can be verified with the checksums file.

sboms:
  - artifacts: archive

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
