version: '3.8'

services:
  umailserver:
    build: .
    container_name: umailserver
    restart: unless-stopped
    ports:
      - "25:25"
      - "587:587"
      - "110:110"
      - "995:995"
      - "143:143"
      - "993:993"
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - TZ=UTC
    networks:
      - mailnet

networks:
  mailnet:
    driver: bridge
