version: '3.8'

services:
  umailserver:
    image: ghcr.io/umailserver/umailserver:latest
    container_name: umailserver
    restart: unless-stopped
    ports:
      # SMTP
      - "25:25"
      - "587:587"
      # POP3
      - "110:110"
      - "995:995"
      # IMAP
      - "143:143"
      - "993:993"
      # Web/API
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./certs:/data/certs:ro
    environment:
      - TZ=UTC
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: umail-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - mailnet
    profiles:
      - monitoring

volumes:
  prometheus_data:

networks:
  mailnet:
    driver: bridge
